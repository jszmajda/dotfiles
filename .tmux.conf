set-option -g prefix C-s
setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key C-h select-pane -L
bind-key C-j select-pane -D
bind-key C-k select-pane -U
bind-key C-l select-pane -R
bind-key C-v split-window -h
bind-key C-s split-window

bind-key H resize-pane -L
bind-key J resize-pane -D
bind-key K resize-pane -U
bind-key L resize-pane -R
bind-key C-H resize-pane -L 5
bind-key C-J resize-pane -D 5
bind-key C-K resize-pane -U 5
bind-key C-L resize-pane -R 5
bind-key C-d detach-client

set -g status-right "%d-%h-%Y"

# Allow claude code to rename panes and windows
set-option -g set-titles on
set-option -g set-titles-string "#{pane_title}"
set-option -g allow-rename on
setw -g automatic-rename on

set -g mouse on

# Invertible scroll wheel (for terminals like Termius/iPad that send it backwards).
# Toggle with prefix + I. @invert-scroll=0 reproduces tmux's stock behavior.
set -g @invert-scroll 0

bind -T root WheelUpPane {
  if -F '#{||:#{pane_in_mode},#{mouse_any_flag}}' { send -Mt= } {
    if -Ft= '#{alternate_on}' {
      if -F '#{@invert-scroll}' { send -t= Down } { send -Mt= }
    } {
      if -F '#{@invert-scroll}' { run -b : } { copy-mode -et= }
    }
  }
}

bind -T root WheelDownPane {
  if -F '#{||:#{pane_in_mode},#{mouse_any_flag}}' { send -Mt= } {
    if -Ft= '#{alternate_on}' {
      if -F '#{@invert-scroll}' { send -t= Up } { send -Mt= }
    } {
      if -F '#{@invert-scroll}' { copy-mode -et= } { run -b : }
    }
  }
}

bind -T copy-mode WheelUpPane {
  select-pane
  if -F '#{@invert-scroll}' { send -X -N 5 scroll-down } { send -X -N 5 scroll-up }
}
bind -T copy-mode WheelDownPane {
  select-pane
  if -F '#{@invert-scroll}' { send -X -N 5 scroll-up } { send -X -N 5 scroll-down }
}
bind -T copy-mode-vi WheelUpPane {
  select-pane
  if -F '#{@invert-scroll}' { send -X -N 5 scroll-down } { send -X -N 5 scroll-up }
}
bind -T copy-mode-vi WheelDownPane {
  select-pane
  if -F '#{@invert-scroll}' { send -X -N 5 scroll-up } { send -X -N 5 scroll-down }
}

bind I if -F '#{@invert-scroll}' \
  'set -g @invert-scroll 0 ; display-message "scroll: normal"' \
  'set -g @invert-scroll 1 ; display-message "scroll: inverted"'

set -g set-clipboard on
set -g allow-passthrough on

# Claude Code waiting indicator
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[reverse],}#{pane_index}#[default] #{?#{==:#{@claude-waiting},1},⏳ waiting — ,}\"#{pane_title}\""
set -g focus-events on
set-hook -g pane-exited  "run-shell '~/.claude/hooks/tmux-waiting.sh recount \"\" #{hook_window}'"
set-hook -g pane-focus-in "run-shell '~/.claude/hooks/tmux-waiting.sh clear #{hook_pane} #{hook_window}'"
